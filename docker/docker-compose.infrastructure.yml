services:
  postgres:
    image: postgres:18.3
    container_name: verso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-verso}
      POSTGRES_USER: ${POSTGRES_USER:-verso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verso_secure_password}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-md5}
      PGDATA: /var/lib/postgresql/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verso}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - verso-network

  rustfs:
    image: rustfs/rustfs:${RUSTFS_VERSION:-latest}
    container_name: verso-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-verso}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-verso_secret_key}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
    ports:
      - "${RUSTFS_PORT:-6000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-6001}:9001"
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - verso-network

volumes:
  postgres_data:
    driver: local
  rustfs_data:
    driver: local
  rustfs_logs:
    driver: local

networks:
  verso-network:
    driver: bridge
