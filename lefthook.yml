pre-commit:
  commands:
    lint-format:
      run: bun run check
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
    go-format:
      run: cd packages/backy && ./scripts/format.sh
      glob:
        - "packages/backy/**/*.go"
      stage_fixed: true
    autobump:
      run: bun run autobump
      stage_fixed: true
    shellcheck:
      run: shellcheck {staged_files}
      glob:
        - "**/*.sh"
pre-push:
  commands:
    monorepo-check:
      run: bun run check:ci
    monorepo-check-types:
      run: bun run check-types
