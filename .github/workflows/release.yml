name: Release

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_WEB: verso-web
  IMAGE_NAME_API: verso-serve

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: packages/backy/go.sum

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Go tools
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('packages/backy/go.sum') }}

      - name: Install Go tools
        run: |
          # Pinned versions for reproducible CI
          [ -f $(go env GOPATH)/bin/gofumpt ] || go install mvdan.cc/gofumpt@v0.7.0
          [ -f $(go env GOPATH)/bin/goimports ] || go install golang.org/x/tools/cmd/goimports@v0.31.0
          [ -f $(go env GOPATH)/bin/golangci-lint ] || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      - name: Install dependencies
        run: bun install

      - name: Run lint and format check
        run: bun run check

      - name: Run type check
        run: bun run check-types

      - name: Run tests
        run: bun nx affected -t test --parallel=3

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        include:
          - package: weby
            image-name: verso-web
            dockerfile: ./packages/weby/Dockerfile
            context: .
          - package: backy
            image-name: verso-serve
            dockerfile: ./packages/backy/Dockerfile
            context: ./packages/backy
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image-name
            }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ github.ref_name }}
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{
            matrix.image-name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-desktop:
    name: Build Desktop app (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: check
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Apple Certificates
        if: matrix.platform == 'macos' && env.MACOS_CERTIFICATE != ''
        env:
          BUILD_CERTIFICATE_BASE64: ${{ env.MACOS_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install dependencies
        run: bun install

      - name: Build monorepo packages (weby)
        run: bun --cwd packages/weby run build

      - name: Build Electrobun App
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          ELECTROBUN_MAC_CODESIGN: ${{ secrets.MACOS_CERTIFICATE != '' && 'true' || 'false' }}
        run: bun --cwd packages/native run build:stable

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.platform }}
          path: packages/native/artifacts/*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, build-desktop]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          {
            echo "changes<<CHANGES_EOF"
            echo "## Changes"
            echo ""
            if [ -z "$COMMITS" ]; then
              echo "No new commits since last release."
            else
              echo "$COMMITS"
            fi
            echo ""
            echo "## Container Images"
            echo ""
            echo "- \"${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_WEB }}:${{ steps.version.outputs.tag }}\""
            echo "- \"${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_API }}:${{ steps.version.outputs.tag }}\""
            echo ""
            echo "- \"${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_WEB }}:latest\""
            echo "- \"${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_API }}:latest\""
            echo "CHANGES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-artifacts
          pattern: desktop-artifacts-*
          merge-multiple: true

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.changes }}
          files: |
            desktop-artifacts/*
          make_latest: true
          generate_release_notes: false

  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger backy deploy (runs migrations on startup)
        run: |
          curl -X 'POST' \
            '${{ secrets.DOKPLOY_API_URL }}/api/application.deploy' \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}' \
            -d '{ "applicationId": "${{ secrets.DOKPLOY_APP_ID }}" }' \
            --fail --silent --show-error

      - name: Wait for deploy to complete (migrations run on startup)
        run: |
          API_URL="${{ secrets.DOKPLOY_API_URL }}"
          TOKEN="${{ secrets.DOKPLOY_API_TOKEN }}"
          APP_ID="${{ secrets.DOKPLOY_APP_ID }}"
          echo "Polling Dokploy deployment status..."
          for i in $(seq 1 24); do
            RESPONSE=$(curl -s "$API_URL/api/deployment.all?applicationId=$APP_ID" -H "x-api-key: $TOKEN")
            STATUS=$(echo "$RESPONSE" | jq -r 'if type == "array" then .[0].status // .[0].applicationStatus // "polling" else .status // .applicationStatus // "polling" end')
            echo "attempt $i/24: status=$STATUS"
            if [ "$STATUS" = "done" ] || [ "$STATUS" = "running" ]; then
              echo "Deployment complete (migrations applied)"
              exit 0
            fi
            if [ "$STATUS" = "error" ] || [ "$STATUS" = "failed" ]; then
              echo "Deployment failed"
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for deployment"
          exit 1
